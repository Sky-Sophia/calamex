<!doctype html>
<html lang="zh-CN" class="light" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <title>Calamex</title>
  <style>
    :root {
      /* 真实浅色主题 token（取自 src/styles.css 的 .light 调色板） */
      --s-app-bg: #fafafa;
      --s-sidebar-bg: #fafafa;
      --s-panel-bg: #ffffff;
      --s-content-bg: #ffffff;
      --s-divider: #d1d9e0b3;
      --s-border-strong: #d1d9e0;
      --s-text-primary: #1f2328;
      --s-text-secondary: #59636e;
      --s-text-tertiary: #818b98;
      --s-surface-soft: #818b981f;
      --s-surface-soft-strong: #d1d9e0b3;
      --s-skeleton: #e6e9ed;
      --s-send: #2783de;
      --s-radius-card: 12px;
      --s-radius-md: 8px;
      --s-top: 40px;
      --s-sidebar-w: 288px;
      --s-font:
        'Inter', 'Inter Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI',
        'Microsoft YaHei', sans-serif;
      --s-mono:
        'Berkeley Mono', 'JetBrains Mono', 'SFMono-Regular', 'Consolas', 'ui-monospace', monospace;
    }

    html,
    body,
    #app {
      position: fixed;
      inset: 0;
      min-height: 100vh;
      margin: 0;
      background-color: var(--s-app-bg);
      color: var(--s-text-primary);
      font-family: var(--s-font);
    }

    body {
      overflow: hidden;
    }

    .startup-shell {
      position: fixed;
      inset: 0;
      display: flex;
      overflow: hidden;
      background: var(--s-app-bg);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--s-divider) 46%, transparent);
      color: var(--s-text-primary);
      pointer-events: none;
      user-select: none;
    }

    /* ===================== 侧栏（WorkbenchDashboardSidebar 还原） ===================== */
    .s-sidebar {
      display: flex;
      width: var(--s-sidebar-w);
      min-width: var(--s-sidebar-w);
      flex-direction: column;
      overflow: hidden;
      background: var(--s-sidebar-bg);
    }

    .s-brand {
      display: flex;
      align-items: center;
      min-height: 28px;
      padding: 8px 18px 2px;
    }

    .s-brand svg {
      display: block;
      width: 70px;
      height: auto;
    }

    .s-toolbar-shell {
      border-bottom: 1px solid var(--s-divider);
      padding: 12px;
    }

    .s-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .s-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      min-width: 38px;
      height: 28px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--s-divider) 8%, transparent);
      padding: 0 10px;
    }

    .s-pill.is-active {
      gap: 6px;
      background: color-mix(in srgb, var(--s-divider) 34%, transparent);
    }

    .s-pill-ic {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      background: var(--s-skeleton);
      flex-shrink: 0;
    }

    .s-pill-lb {
      width: 26px;
      height: 11px;
      border-radius: 999px;
      background: var(--s-skeleton);
    }

    .s-tree {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 2px;
      padding: 10px 4px;
    }

    .s-tree-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      border-radius: 6px;
      padding: 4px 8px;
      padding-left: calc(8px + var(--i, 0) * 16px);
    }

    .s-chevron {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      position: relative;
    }

    .s-chevron.has::before {
      content: '';
      position: absolute;
      top: 3px;
      left: 4px;
      width: 5px;
      height: 5px;
      border-right: 1.5px solid var(--s-text-tertiary);
      border-bottom: 1.5px solid var(--s-text-tertiary);
      transform: rotate(45deg);
      opacity: .7;
    }

    .s-ficon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: var(--s-skeleton);
      flex-shrink: 0;
    }

    .s-tline {
      height: 10px;
      border-radius: 999px;
      background: var(--s-skeleton);
    }

    /* ===================== 右侧内容区 ===================== */
    .s-content {
      position: relative;
      display: flex;
      min-width: 0;
      flex: 1;
      flex-direction: column;
      padding-top: var(--s-top);
      background: var(--s-app-bg);
    }

    .s-winctrls {
      position: absolute;
      top: -1px;
      right: -1px;
      z-index: 5;
      display: flex;
      height: calc(var(--s-top) + 1px);
      align-items: stretch;
    }

    .s-winbtn {
      display: inline-flex;
      width: 48px;
      height: 100%;
      align-items: center;
      justify-content: center;
      color: var(--s-text-primary);
    }

    .s-winbtn.is-close {
      width: 49px;
      margin-left: -1px;
    }

    .s-winbtn svg {
      width: 14px;
      height: 14px;
    }

    .s-card {
      position: relative;
      display: flex;
      flex: 1;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--s-divider);
      border-radius: var(--s-radius-card);
      background: var(--s-content-bg);
    }

    /* ===================== AI 形态（AiAssistantPanel 还原） ===================== */
    .startup-ai {
      display: flex;
      flex: 1;
      min-height: 0;
      flex-direction: column;
      background: var(--s-content-bg);
    }

    .startup-editor {
      display: none;
    }

    :root[data-startup-mode='editor'] .startup-ai {
      display: none;
    }

    :root[data-startup-mode='editor'] .startup-editor {
      display: flex;
      flex: 1;
      min-height: 0;
      flex-direction: column;
      background: var(--s-content-bg);
    }

    .s-ai-header {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 52px;
      padding: 12px 18px 10px;
    }

    .s-ai-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .s-ai-mark-ic {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      background: var(--s-skeleton);
    }

    .s-ai-mark-lb {
      width: 88px;
      height: 13px;
      border-radius: 999px;
      background: var(--s-skeleton);
    }

    .s-ai-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .s-ai-iconbtn {
      display: grid;
      width: 26px;
      height: 26px;
      place-items: center;
      border-radius: 6px;
      color: var(--s-text-tertiary);
    }

    .s-ai-iconbtn svg {
      width: 15px;
      height: 15px;
    }

    .s-ai-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px 10px;
      padding: clamp(56px, 16vh, 160px) 16px 0;
    }

    .s-ai-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px 10px;
      max-width: 640px;
    }

    .s-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      border-radius: var(--s-radius-md);
      background: color-mix(in srgb, var(--s-surface-soft) 62%, transparent);
      padding: 7px 17px;
    }

    .s-chip span {
      display: block;
      height: 12px;
      border-radius: 999px;
      background: var(--s-skeleton);
    }

    .s-ai-composer {
      align-self: stretch;
      width: min(100%, 710px);
      max-width: 860px;
      margin: 0 auto;
      padding: 0 12px 28px;
      box-sizing: border-box;
    }

    .s-prompt {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #efeeec;
      border-radius: 18px;
      background: var(--s-panel-bg);
      box-shadow:
        0 1px 2px color-mix(in srgb, var(--s-text-primary) 8%, transparent),
        0 14px 30px color-mix(in srgb, var(--s-text-primary) 6%, transparent);
      overflow: hidden;
    }

    .s-prompt-text {
      min-height: 56px;
      padding: 16px 20px 7px;
      color: var(--s-text-tertiary);
      font-size: 16px;
      line-height: 20.4px;
    }

    .s-prompt-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 10px 10px 14px;
    }

    .s-ctrl {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--s-text-secondary);
    }

    .s-ctrl svg {
      width: 17px;
      height: 17px;
    }

    .s-prompt-spacer {
      flex: 1 1 auto;
    }

    .s-model {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 30px;
      border-radius: 999px;
      padding: 0 8px;
      color: var(--s-text-secondary);
    }

    .s-model-ic {
      width: 17px;
      height: 17px;
      border-radius: 5px;
      background: var(--s-skeleton);
    }

    .s-model-lb {
      width: 58px;
      height: 12px;
      border-radius: 999px;
      background: var(--s-skeleton);
    }

    .s-send {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--s-send);
      color: #ffffff;
    }

    .s-send svg {
      width: 16px;
      height: 16px;
    }

    /* ===================== 编辑器形态（StartupWorkbenchShell 还原） ===================== */
    .s-ed-tabbar {
      display: flex;
      min-height: 36px;
      align-items: stretch;
      justify-content: space-between;
      border-bottom: 1px solid var(--s-divider);
      background: var(--s-panel-bg);
    }

    .s-ed-tabs {
      display: flex;
      min-width: 0;
      flex: 1;
      overflow: hidden;
    }

    .s-ed-tab {
      display: inline-flex;
      width: 144px;
      align-items: center;
      gap: 7px;
      border-right: 1px solid color-mix(in srgb, var(--s-divider) 72%, transparent);
      padding: 0 12px;
    }

    .s-ed-tab-ic {
      width: 15px;
      height: 15px;
      border-radius: 4px;
      background: var(--s-skeleton);
    }

    .s-ed-tab-tl {
      width: 82px;
      height: 10px;
      border-radius: 999px;
      background: var(--s-skeleton);
    }

    .s-ed-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
    }

    .s-ed-dot {
      width: 15px;
      height: 15px;
      border-radius: 5px;
      background: var(--s-skeleton);
    }

    .s-ed-editor {
      display: grid;
      flex: 1;
      min-height: 0;
      grid-template-columns: 52px minmax(0, 1fr);
      overflow: hidden;
      background: var(--s-content-bg);
    }

    .s-ed-gutter {
      display: grid;
      align-content: start;
      gap: 14px;
      border-right: 1px solid color-mix(in srgb, var(--s-divider) 48%, transparent);
      padding: 18px 12px 0 0;
      color: color-mix(in srgb, var(--s-text-tertiary) 78%, transparent);
      font-family: var(--s-mono);
      font-size: 11px;
      line-height: 1;
      text-align: right;
    }

    .s-ed-code {
      display: grid;
      align-content: start;
      gap: 15px;
      padding: 18px 22px;
    }

    .s-ed-line {
      height: 10px;
      border-radius: 999px;
      background: var(--s-skeleton);
    }

    /* ===================== 骨架脉冲（对齐 Tailwind animate-pulse） ===================== */
    .s-skel {
      animation: s-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes s-pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .5;
      }
    }

    @media (max-width: 820px) {
      .s-sidebar {
        display: none;
      }

      .s-winctrls {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .s-skel {
        animation: none;
      }
    }
  </style>
  <script>
    (function () {
      var mark = function (name) {
        try { performance.mark('calamex:startup:' + name); } catch (_) { }
      };
      mark('index-theme-start');
      // 仅浅色，无深色模式。根据上次会话的主形态选择骨架（AI / 编辑器），默认 AI。
      var mode = 'ai';
      try {
        var raw = localStorage.getItem('shell-ide.app');
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && parsed.workbenchPrimaryMode === 'editor') {
            mode = 'editor';
          }
        }
      } catch (_) { }
      document.documentElement.dataset.startupMode = mode;
      mark('index-theme-ready');
    })();
  </script>
</head>
